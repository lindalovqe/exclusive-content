<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Immediate Redirect Header -->
    <meta http-equiv="refresh" content="0; url=https://urlto.me">
    <script type="text/javascript">
        window.location.href = "https://urlto.me";
    </script>
    <title>OnlyFans - Content Gateway</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loading-container {
            padding: 20px;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #00aff0; /* OnlyFans signature blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #00aff0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>Verifying Content Access...</h2>
        <p>Please wait while we establish a secure connection to the gallery.</p>
        <p style="font-size: 12px; color: #666;">If you are not forwarded automatically, <a href="https://urlto.me">click here</a>.</p>
    </div>
</body>
</html>
